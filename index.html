<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Jumplink home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hub-container {
            display: flex;
            gap: 30px;
            margin-top: 100px;
        }

        .app-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            text-align: center;
            width: 370px;
            border: 2px solid transparent;
            transition: 0.3s;
            font-size: 25px;
        }

        .app-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-10px);
        }
    </style>
</head>

<body>
    <h1>Select Discipline</h1>
    <div class="hub-container">
        <a href="trampoline/index.html" class="app-card">
            <h2>Trampoline</h2>
            <p>Jumps & combos</p>
        </a>
        <a href="tricking/index.html" class="app-card">
            <h2>Tricking</h2>
            <p>Kicks & Transitions</p>
        </a>
    </div>

    <footer>
        <p class="instagram-link">
            <a href="https://instagram.com/air_runner" target="_blank" rel="noopener noreferrer">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram logo"
                    class="insta-logo">
                @air_runner
            </a>
        </p>
    </footer>
</body>

</html>
